id: aweb.marketing
name: Marketing AI Team
version: 0.1.0
summary: A marketing team that produces and ships polished, on-brand copy and web pages, starting with a proofreader.
description: >-
  A first-party blueprint for a marketing team of AI coworkers that produces and
  ships polished, on-brand copy and web pages. It starts with a proofreader - an
  independent set of eyes that reads copy and rendered web pages before they go
  live, catching errors, sharpening clarity, holding voice and consistency, and
  returning a clear ship-or-amend verdict. Grow the team by adding profiles (a
  copywriter, a content strategist) as you need them. Like the engineering
  blueprint, the profiles describe behavior, not a tool lock-in, and coordinate
  over shared aweb task/mail/chat state.
profiles:
  - id: proofreader
    default_count: 1
    min: 1
    max: 2
    runtime_hints: [claude-code, pi]
runtime_hints: [claude-code, pi]
expected_apps: [library, tasks]
first_mission_examples:
  - Proofread this landing page before it ships.
  - Review this email campaign copy for errors, clarity, and voice.
  - Check this blog post against our style guide and flag what blocks publishing.
