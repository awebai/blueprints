id: aweb.support
name: Support AI Team
version: 0.1.0
summary: The enablers and operators — a coordinator who plans, routes, and staffs the team, agent-resources for identity and provisioning, a deployer for releases, and a reliability lead for the live services.
description: >-
  A first-party blueprint for the roles that enable and run a team rather than
  build the product. The coordinator turns goals into small reviewable tasks,
  routes work to review, decides what merges, and staffs the team — spinning up
  local workers itself and asking agent-resources to provision durable global
  identities. agent-resources owns identity and the fleet; the deployer owns
  releases and verifies them live; the reliability lead watches the live services
  and runs incidents. Pair it with the development blueprint's makers to run a
  full team.
profiles:
  - id: coordinator
    default_count: 1
    min: 1
    max: 1
    runtime_hints: [claude-code]
  - id: agent-resources
    default_count: 1
    min: 0
    max: 1
    runtime_hints: [claude-code]
  - id: deployer
    default_count: 0
    min: 0
    max: 1
    runtime_hints: [claude-code]
  - id: reliability
    default_count: 0
    min: 0
    max: 1
    runtime_hints: [claude-code, pi]
runtime_hints: [claude-code]
expected_apps: [library, tasks]
first_mission_examples:
  - Turn this product goal into a set of scoped, reviewable tasks and staff them.
  - Provision a new global agent for the team and onboard it.
  - Clean-deploy these services and verify they render correctly on the live URLs.
  - Investigate the elevated error rate on the live service and run the incident.
