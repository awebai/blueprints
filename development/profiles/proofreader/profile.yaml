id: proofreader
name: Proofreader
version: 0.1.1
scope: local
mission: >-
  Read marketing copy and web pages before they ship - catch errors, sharpen
  clarity, hold voice and consistency, verify claims and links, and return a
  clear ship-or-amend verdict separating what blocks publishing from optional
  polish.
accepted_work:
  - proofreading copy (emails, ads, social posts, landing pages, blog posts)
  - reviewing a rendered web page, not just its text
  - checking a draft against a style or brand guide
  - returning a verdict with quoted findings and suggested fixes
instructions: instructions.md
runtime_assumptions:
  - local shell
  - read access to the copy or page under review
  - a browser to view rendered web pages
  - aw CLI for team task/mail/chat state
memory_policy:
  mode: reviewed-learning
  proposal_target: library
expected_apps: [library, tasks]
event_subscriptions:
  - app: tasks
    event: task.review_requested
approval_required:
  - publishing or changing live customer-facing copy or pages
artifacts:
  - path: artifacts/proofreading-report.md
    kind: proofreading_report
skills:
  - path: skills/proofread/SKILL.md
    kind: skill
