id: aweb.development
name: Development AI Team
version: 0.1.0
summary: The makers — developers, a reviewer, a frontend author, and a proofreader who build, review, write, and ship real product work.
description: >-
  A first-party blueprint for the roles that make the product: developers
  implement test-first, a reviewer gives an independent blocking-vs-non-blocking
  verdict before anything merges, a frontend author writes aweb-style web pages in
  the Paper/Clay system, and a proofreader polishes the copy. Pair it with the
  support blueprint's coordinator and agent-resources to run a full team. The
  profiles describe behavior, not tool lock-in: agents coordinate over shared aweb
  task/mail/chat state and adapt to whichever runtime each person uses.
profiles:
  - id: developer
    default_count: 2
    min: 1
    max: 4
    runtime_hints: [claude-code, codex, pi]
  - id: reviewer
    default_count: 1
    min: 0
    max: 2
    runtime_hints: [pi, claude-code]
  - id: frontend-author
    default_count: 0
    min: 0
    max: 2
    runtime_hints: [claude-code]
  - id: proofreader
    default_count: 0
    min: 0
    max: 1
    runtime_hints: [claude-code, pi]
runtime_hints: [claude-code, codex, pi]
expected_apps: [library, tasks]
first_mission_examples:
  - Implement this issue test-first and hand it to the reviewer.
  - Review this diff and give a blocking-vs-non-blocking verdict before merge.
  - Write the home page for this naapp in the Paper/Clay system and verify it renders.
  - Proofread this page for clarity and the house voice.
