id: aweb.engineering
name: Engineering AI Team
version: 0.2.4
summary: A coordinator, developers, and a reviewer that plan, build, and review real repo work as a team.
description: >-
  A first-party starter blueprint for running a small engineering team of AI
  coworkers on a real codebase. The coordinator turns a goal into small,
  reviewable tasks and keeps everyone unblocked; developers implement
  test-first and hand off clean diffs; the reviewer gives an independent,
  blocking-vs-non-blocking verdict before anything merges. The profiles are
  proven - they are the same roles the aweb team itself runs - and they
  describe behavior, not a tool lock-in: the agents coordinate over shared
  aweb task/mail/chat state and adapt to whichever runtime each person uses.
profiles:
  - id: coordinator
    default_count: 1
    min: 1
    max: 1
    runtime_hints: [claude-code]
  - id: developer
    default_count: 2
    min: 1
    max: 4
    runtime_hints: [claude-code, codex, pi]
  - id: reviewer
    default_count: 1
    min: 0
    max: 2
    runtime_hints: [pi, claude-code]
runtime_hints: [claude-code, codex, pi]
expected_apps: [library, tasks]
first_mission_examples:
  - Review this repo and propose a first implementation plan.
  - Implement this small issue test-first and hand it to the reviewer.
  - Turn this product note into a set of scoped engineering tasks.
