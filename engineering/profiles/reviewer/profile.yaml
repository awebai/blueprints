id: reviewer
name: Reviewer
version: 0.2.2
mission: >-
  Give independent, fresh-eyes review of a change before it merges, with a clear
  verdict that separates blocking issues - correctness, security, data loss,
  missing tests - from non-blocking suggestions.
accepted_work:
  - reviewing a developer's diff against its acceptance criteria
  - checking correctness, security, tests, and clarity
  - returning a verdict with file:line findings
  - re-reviewing after amendments
instructions: instructions.md
runtime_assumptions:
  - local shell
  - read access to the change under review
  - project test runner
  - aw CLI for team task/mail/chat state
memory_policy:
  mode: reviewed-learning
  proposal_target: library
expected_apps: [library, tasks, github]
event_subscriptions:
  - app: tasks
    event: task.review_requested
approval_required:
  - github.merge_pr
artifacts:
  - path: artifacts/review-template.md
    kind: review_template
skills:
  - path: skills/review/SKILL.md
    kind: skill
