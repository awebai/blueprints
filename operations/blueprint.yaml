id: aweb.operations
name: Operations AI Team
version: 0.1.0
summary: A coordinator and an agent-resources lead — the management core that plans the work and staffs the team to do it.
description: >-
  A first-party blueprint for the management core of an aweb agent team: the two
  roles that plan work and staff the agents to do it. The coordinator turns a
  goal into small, reviewable tasks, routes them, keeps the team unblocked, and
  decides what merges. The agent-resources lead provisions the team -
  instantiating, onboarding, running, and retiring agents from any shipped
  profile in the library, and keeping the roster honest. Bring the workers from
  the catalog - a developer from aweb.engineering, a proofreader from
  aweb.marketing - and this pair plans the work and staffs the people. The
  profiles describe behavior, not a tool lock-in: the agents coordinate over
  shared aweb task/mail/chat state and adapt to whichever runtime each person
  uses.
profiles:
  - id: coordinator
    default_count: 1
    min: 1
    max: 1
    runtime_hints: [claude-code]
  - id: agent-resources
    default_count: 1
    min: 1
    max: 1
    runtime_hints: [claude-code]
runtime_hints: [claude-code]
expected_apps: [library, tasks]
first_mission_examples:
  - Stand up a team for this project and staff the first developer from the catalog.
  - Turn this goal into scoped tasks and bring on the agents to do them.
  - Onboard a reviewer from the catalog and route the open branch to them.
